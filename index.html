*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}

.sp-logo{font-size:36px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#E8720C,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fu .8s ease forwards;}

@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

<div id="splash">

    <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted)">🔍</span>
  </div></div>
  ${q.length<2?`<div class="es"><div class="ei">🔍</div><div class="et">Digite para buscar</div><div class="ex">Busque por nome, ingrediente ou categoria</div></div>`:rs.length===0?`<div class="es"><div class="ei">😔</div><div class="et">Nenhum resultado</div><div class="ex">Tente outros termos</div></div>`:`<div class="fl">${rs.map(f=>`<div class="fi" data-a="form" data-id="${f.id}"><div class="fic"><div style="font-size:11px;color:var(--accent);margin-bottom:2px">${f.catIcon} ${f.catName}</div><div class="fit">${f.title}</div><div class="fid">${f.desc}</div></div><div class="far">›</div></div>`).join('')}</div>`}`;
}

function rFavs(){
  const fs=F.filter(f=>isFav(f.id));
  if(!fs.length)return`<div class="es"><div class="ei">♡</div><div class="et">Nenhum favorito</div><div class="ex">Salve as fórmulas que você mais usa para acessar rapidamente aqui.</div></div>`;
  return`<div style="padding:14px 16px 6px;font-size:13px;color:var(--muted)">${fs.length} fórmula${fs.length!==1?'s':''} salva${fs.length!==1?'s':''}</div><div class="fl">${fs.map(f=>`<div class="fi fv" data-a="form" data-id="${f.id}"><div class="fic"><div style="font-size:11px;color:var(--accent);margin-bottom:2px">${f.catIcon} ${f.catName}</div><div class="fit">${f.title}</div><div class="fid">${f.desc}</div></div><div class="far">›</div></div>`).join('')}</div>`;
}

function rGloss(){
  return`<div class="lh"><div class="bb" data-a="view" data-v="home">‹</div><div class="lt"><div class="lic">📚</div><div class="ltx">Glossário de Insumos</div><div class="lct">${GL.length} ingredientes com preço e substitutos</div></div></div>
  <div class="gs"><input type="text" id="gi" placeholder="Filtrar ingredientes..."></div>
  <div class="gw"><table class="gt"><thead><tr><th>Insumo</th><th>Uso na Fórmula</th><th>Função Principal</th><th>Substituto</th><th>Preço Médio</th></tr></thead><tbody id="gb">${GL.map(([n,u,fn,sub,p])=>`<tr><td><div class="gn">${n}</div></td><td class="gm">${u}</td><td class="gm">${fn}</td><td class="gm">${sub}</td><td class="gp">${p}</td></tr>`).join('')}</tbody></table></div>`;
}

function rSupp(){
  let h=`<div class="lh"><div class="bb" data-a="view" data-v="home">‹</div><div class="lt"><div class="lic">📍</div><div class="ltx">Fornecedores</div><div class="lct">Nacional + Marketplaces + Online</div></div></div>`;
  for(const[r,s] of Object.entries(SU)){
    h+=`<div class="sr">${r}</div>`;
    for(const[n,c,co] of s)h+=`<div class="sc"><div class="sn">${n}</div><div class="sct">📍 ${c}</div><div class="sco">${co}</div></div>`;
  }
  return h;
}

function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>el.addEventListener('click',handleA));
  const si=$('si');
  if(si){si.focus();si.addEventListener('input',e=>{S.q=e.target.value;render();});}
  const gi=$('gi');
  if(gi)gi.addEventListener('input',e=>{const q=e.target.value.toLowerCase();document.querySelectorAll('#gb tr').forEach(r=>{r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';});});
}

function handleA(e){
  const a=e.currentTarget,ac=a.dataset.a;
  if(ac==='view')go(a.dataset.v);
  else if(ac==='cat')go('cat',{cat:a.dataset.cat});
  else if(ac==='form')go('form',{fid:a.dataset.id});
  else if(ac==='fav')togFav(a.dataset.id);
  else if(ac==='print')window.print();
  else if(ac==='share')shareF(a.dataset.id);
  else if(ac==='font'){const ss=['n','l','s'],i=ss.indexOf(S.fs),nx=ss[(i+1)%3];S.fs=nx;sv('fap_fs',JSON.stringify(nx));document.body.className=nx==='l'?'fl':nx==='s'?'fs':'';}
  else if(ac==='inst-tab'){S.instTab=a.dataset.tab;renderInstModal();}
}

function shareF(id){const f=F.find(x=>x.id===id);if(!f)return;const txt=`${f.title} — Fórmula Auto Pro\n\n${f.desc}\n\nAcesse: ${location.href}`;if(navigator.share)navigator.share({title:f.title,text:txt}).catch(()=>{});else navigator.clipboard?.writeText(txt).then(()=>alert('Link copiado!')).catch(()=>{});}

function openInstModal(){$('inst-modal').classList.add('open');renderInstModal();}
function closeInstModal(){$('inst-modal').classList.remove('open');}

function renderInstModal(){
  const ios=S.instTab==='ios';
  const steps=ios?[
    'Abra este link no navegador <strong>Safari</strong> (obrigatório no iPhone)',
    'Toque no ícone de compartilhamento <strong>⬆</strong> na barra inferior',
    'Role para baixo e toque em <strong>"Adicionar à Tela de Início"</strong>',
    'Confirme tocando em <strong>Adicionar</strong> no canto superior direito',
    'O ícone do app aparece na sua tela — abra direto por ele!',
  ]:[
    'Abra este link no navegador <strong>Google Chrome</strong>',
    'Toque nos 3 pontos <strong>⋮</strong> no canto superior direito',
    'Toque em <strong>"Instalar aplicativo"</strong> ou "Adicionar à tela inicial"',
    'Confirme tocando em <strong>Instalar</strong>',
    'O ícone do app aparece na sua tela — acesso rápido e offline!',
  ];
  const bx=$('inst-box');
  if(bx)bx.innerHTML=`
    <div class="inst-title">📲 Instalar Fórmula Auto Pro</div>
    <div class="inst-sub">Acesse offline, qualquer hora, sem precisar de internet</div>
    <div class="inst-tabs">
      <div class="inst-tab${ios?' on':''}" data-a="inst-tab" data-tab="ios">🍎 iPhone</div>
      <div class="inst-tab${!ios?' on':''}" data-a="inst-tab" data-tab="android">🤖 Android</div>
    </div>
    <div class="inst-steps">${steps.map((s,i)=>`<div class="inst-step"><div class="inst-num">${i+1}</div><div class="inst-txt">${s}</div></div>`).join('')}</div>
    <button class="inst-close" onclick="closeInstModal()">Entendi ✓</button>`;
  document.querySelectorAll('[data-a="inst-tab"]').forEach(el=>el.addEventListener('click',handleA));
}

let dP=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;setTimeout(()=>{const ip=$('ip');if(ip)ip.style.display='block';},5000);});
function instApp(){$('ip').style.display='none';if(dP){dP.prompt();dP.userChoice.then(()=>{dP=null;});}}
function disInst(){$('ip').style.display='none';}

function init(){
  const fz=ls('fap_fs','"n"');if(fz!=='n')document.body.className=fz==='l'?'fl':'fs';
  setTimeout(()=>{
    const sp=$('splash'),ap=$('app');
    if(sp){sp.style.opacity='0';sp.style.transition='opacity .5s';}
    setTimeout(()=>{
      if(sp)sp.style.display='none';
      if(ap)ap.removeAttribute('hidden');
      render();
      // Show install modal automatically if not standalone
      const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
      if(!isStandalone&&!localStorage.getItem('fap_inst_shown')){
        setTimeout(()=>openInstModal(),1200);
        localStorage.setItem('fap_inst_shown','1');
      }
    },520);
  },2200);
  document.querySelectorAll('.ni').forEach(el=>el.addEventListener('click',()=>{const v=el.dataset.v;if(v)go(v);}));
  $('hdr-logo')?.addEventListener('click',()=>go('home'));
  $('hdr-s')?.addEventListener('click',()=>go('search'));
  $('hdr-f')?.addEventListener('click',()=>go('favs'));
  $('hdr-inst')?.addEventListener('click',openInstModal);
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
