<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#080B0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Fórmula Auto Pro</title>
<meta name="description" content="80+ fórmulas automotivas profissionais — o guia completo para produzir e vender.">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#080B0F;--bg2:#0E1117;--card:#111418;--ch:#181D24;--brd:#1E2530;--acc:#E8720C;--acl:#FFB347;--acd:#C4580A;--glo:rgba(232,114,12,0.15);--txt:#F2F4F6;--mut:#8B95A1;--dim:#4A5568;--grn:#22C55E;--blu:#3B82F6;--r:12px;--rl:18px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;direction:ltr;}
/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;}
.sp-logo{font-size:34px;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#E8720C,#FFB347);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fu .8s ease forwards;}
.sp-sub{font-size:12px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;animation:fu .8s .2s ease both;}
.sp-bar{width:120px;height:3px;background:var(--brd);border-radius:2px;overflow:hidden;animation:fu .8s .4s ease both;}
.sp-p{height:100%;width:0;background:linear-gradient(90deg,var(--acc),var(--acl));animation:lb 1.8s .5s ease forwards;}
@keyframes lb{to{width:100%;}}@keyframes fu{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}@keyframes su{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
/* APP */
#app{display:flex;flex-direction:column;min-height:100vh;}
/* HEADER */
#hdr{position:sticky;top:0;z-index:100;background:rgba(8,11,15,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.hdr-logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--acl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;flex-shrink:0;}
.hdr-search{flex:1;position:relative;}
.hdr-search input{width:100%;background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:8px 12px 8px 32px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s;cursor:pointer;direction:ltr;text-align:left;}
.hdr-search input:focus{border-color:var(--acc);}
.hdr-search input::placeholder{color:var(--dim);}
.si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none;}
.hdr-acts{display:flex;gap:6px;flex-shrink:0;}
.ib{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--brd);color:var(--mut);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:all .2s;}
.ib:hover{background:var(--ch);color:var(--acc);border-color:var(--acc);}
/* MAIN */
#main{flex:1;padding-bottom:80px;}
/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(8,11,15,.96);backdrop-filter:blur(16px);border-top:1px solid var(--brd);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;color:var(--dim);font-size:10px;transition:color .2s;border:none;background:none;text-decoration:none;letter-spacing:.3px;}
.ni .ico{font-size:18px;line-height:1;}
.ni.on{color:var(--acc);}
/* PROGRESS */
.pb{height:2px;background:var(--brd);}
.pf{height:100%;background:linear-gradient(90deg,var(--acc),var(--acl));transition:width .3s;}
/* HOME */
.wb{margin:16px;padding:18px;background:linear-gradient(135deg,var(--card),rgba(232,114,12,.06));border:1px solid var(--brd);border-left:3px solid var(--acc);border-radius:var(--rl);}
.wg{font-size:10px;color:var(--acc);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.wt{font-size:18px;font-weight:800;margin-bottom:6px;}
.wx{font-size:13px;color:var(--mut);line-height:1.6;}
.sl{padding:0 16px;margin:18px 0 10px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mut);display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--brd);}
/* PRODUCT CARDS (home) */
.pg{display:flex;flex-direction:column;gap:10px;padding:0 16px;}
.pc{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:16px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;display:flex;align-items:center;gap:14px;}
.pc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glo),transparent 60%);opacity:0;transition:opacity .25s;}
.pc:hover{border-color:var(--acc);transform:translateY(-1px);box-shadow:0 0 24px var(--glo);}
.pc:hover::before{opacity:1;}
.pc.lk{opacity:.55;}
.pc.lk:hover{transform:none;border-color:var(--brd);}
.pc-icon{font-size:32px;flex-shrink:0;}
.pc-body{flex:1;min-width:0;}
.pc-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.pc-sub{font-size:12px;color:var(--mut);line-height:1.4;}
.pc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;flex-shrink:0;}
.pc-badge.inc{background:var(--acc);color:#fff;}
.pc-badge.lk2{background:var(--brd);color:var(--dim);}
.pc-badge.unl{background:rgba(34,197,94,.2);color:var(--grn);border:1px solid rgba(34,197,94,.3);}
/* UTILITY CARDS */
.ug{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.uc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;display:block;}

.uc-icon{font-size:24px;margin-bottom:8px;}
.uc-name{font-size:13px;font-weight:700;margin-bottom:3px;}
.uc-sub{font-size:11px;color:var(--mut);}
/* BONUS */
.bg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.bc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:12px;text-decoration:none;color:inherit;display:block;transition:all .2s;}
.bc:hover{border-color:var(--acl);transform:translateY(-1px);}
.bic{font-size:20px;margin-bottom:6px;}
.bn{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.3;}
.bd{font-size:11px;color:var(--mut);line-height:1.4;}
.bl{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.5px;text-transform:uppercase;}
/* SUB-APP HEADER */
.sah{padding:14px 16px;border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;background:rgba(8,11,15,.95);backdrop-filter:blur(12px);}
.bb{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--brd);color:var(--txt);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:all .2s;}
.bb:hover{border-color:var(--acc);}
.sat{flex:1;}
.sat-icon{font-size:18px;}
.sat-name{font-size:16px;font-weight:700;}
.sat-sub{font-size:11px;color:var(--mut);margin-top:1px;}
/* DOWNLOAD BUTTON */
.dl-wrap{padding:12px 16px;}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--card);border:1px solid var(--brd);color:var(--txt);padding:12px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;width:100%;}
.dl-btn:hover{border-color:var(--acc);color:var(--acc);}
/* CATEGORY CARDS (inside sub-app) */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.cc{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:16px 13px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block;}
.cc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--glo),transparent 60%);opacity:0;transition:opacity .25s;}
.cc:hover{border-color:var(--acc);transform:translateY(-2px);}
.cc:hover::before{opacity:1;}
.ci{font-size:24px;margin-bottom:8px;display:block;}
.cn{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;}
.ck{font-size:11px;color:var(--mut);}
/* FORMULA LIST */
.fl{padding:8px 16px;}
.fi{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px;}
.fi:hover{border-color:var(--acc);background:var(--ch);}

.fi.vd{border-left:3px solid var(--grn);}
.fic{flex:1;min-width:0;}
.fit{font-size:14px;font-weight:600;margin-bottom:4px;}
.fid{font-size:12px;color:var(--mut);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.far{color:var(--dim);font-size:20px;flex-shrink:0;}
/* FORMULA DETAIL */
.fh{padding:18px 16px;border-bottom:1px solid var(--brd);background:linear-gradient(135deg,var(--card),rgba(232,114,12,.04));}
.ftm{font-size:20px;font-weight:800;line-height:1.2;margin-bottom:6px;}
.fdm{font-size:13px;color:var(--mut);line-height:1.6;}
.fav-btn{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--brd);color:var(--mut);font-size:12px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .2s;margin-top:12px;}
.fav-btn.on{color:var(--acc);border-color:var(--acc);background:var(--glo);}
/* DETAIL SECTIONS */
.sb{padding:16px;border-bottom:1px solid var(--brd);}
.sb:last-child{border-bottom:none;}
.bt{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.bt::after{content:'';flex:1;height:1px;background:rgba(232,114,12,.2);}
.ul2{display:flex;flex-wrap:wrap;gap:6px;}
.ut2{background:var(--card);border:1px solid var(--brd);color:var(--mut);font-size:11px;padding:4px 9px;border-radius:6px;}
table.ft,table.dt{width:100%;border-collapse:collapse;}
table.ft th,table.dt th{background:var(--bg2);color:var(--mut);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 10px;text-align:left;border-bottom:1px solid var(--brd);}
table.ft td,table.dt td{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--brd);vertical-align:top;}
table.ft tr:last-child td,table.dt tr:last-child td{border-bottom:none;}
table.ft tr:hover td,table.dt tr:hover td{background:var(--ch);}
table.ft td:last-child{color:var(--acl);font-weight:700;font-family:'Courier New',monospace;text-align:right;white-space:nowrap;}
.dr{font-family:'Courier New',monospace;font-weight:700;color:var(--acc);font-size:13px;}
.de{color:var(--mut);font-size:11px;}
.ifl{display:flex;flex-direction:column;gap:9px;}
.ifi{display:flex;gap:10px;}
.ifn{font-size:11px;font-weight:700;color:var(--acl);flex-shrink:0;min-width:120px;}
.ifd{font-size:12px;color:var(--mut);line-height:1.5;}
.pl{display:flex;flex-direction:column;gap:10px;}
.ps{display:flex;gap:10px;align-items:flex-start;}
.pn{width:24px;height:24px;border-radius:50%;background:var(--acc);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ptx{font-size:13px;line-height:1.6;padding-top:2px;}
.wl{display:flex;flex-direction:column;gap:7px;}
.wi{display:flex;gap:9px;align-items:flex-start;background:var(--card);border-radius:8px;padding:9px 10px;border:1px solid var(--brd);}
.wic{font-size:13px;flex-shrink:0;}
.wtx{font-size:12px;color:var(--mut);line-height:1.5;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ip{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:10px;}
.ipl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-bottom:4px;}
.ipv{font-size:12px;line-height:1.4;}
.sales{background:linear-gradient(135deg,var(--glo),transparent);border:1px solid rgba(232,114,12,.3);border-radius:var(--r);padding:13px;}
.sq{font-size:13px;font-weight:600;line-height:1.5;font-style:italic;margin-bottom:6px;}
.cn2{font-size:11px;color:var(--mut);line-height:1.5;}
/* LEGALIZAÇÃO */
.lg-card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:15px;margin-bottom:8px;cursor:pointer;transition:all .2s;display:flex;align-items:flex-start;gap:12px;}
.lg-card:hover{border-color:var(--blu);background:var(--ch);}
.lg-num{width:28px;height:28px;border-radius:50%;background:var(--blu);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lg-body{flex:1;}
.lg-title{font-size:14px;font-weight:700;margin-bottom:3px;}
.lg-sub{font-size:12px;color:var(--mut);line-height:1.4;}
/* EXCLUSIVA */
.ex-box{margin:16px;padding:20px;background:linear-gradient(135deg,rgba(139,92,246,.12),rgba(139,92,246,.04));border:1px solid rgba(139,92,246,.3);border-radius:var(--rl);}
.ex-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start;}
.ex-num{width:28px;height:28px;border-radius:50%;background:rgba(139,92,246,.8);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ex-txt{font-size:13px;line-height:1.6;padding-top:4px;}
.ex-msg{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:14px;margin:0 16px 14px;font-size:13px;line-height:1.7;color:var(--mut);}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#fff;padding:14px;border-radius:var(--r);font-size:15px;font-weight:700;text-decoration:none;margin:0 16px;transition:opacity .2s;}
.wa-btn:hover{opacity:.9;}
/* SEARCH */
#search-wrap{padding:14px 16px;border-bottom:1px solid var(--brd);}
#search-inp{width:100%;background:var(--card);border:1px solid var(--acc);border-radius:8px;padding:12px 14px 12px 36px;color:var(--txt);font-size:15px;outline:none;direction:ltr;text-align:left;unicode-bidi:embed;}
#search-icon{position:absolute;left:26px;top:50%;transform:translateY(-50%);color:var(--mut);pointer-events:none;}
#search-results{min-height:200px;animation:fi .2s ease;}
/* GLOSSARY */
.gs{padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--brd);}

.gs input:focus{border-color:var(--acc);}
.gw{overflow-x:auto;}
table.gt{width:100%;border-collapse:collapse;min-width:560px;}
table.gt th{background:var(--bg2);color:var(--mut);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:7px 10px;text-align:left;border-bottom:1px solid var(--brd);}
table.gt td{padding:8px 10px;font-size:11px;border-bottom:1px solid var(--brd);vertical-align:top;}
table.gt tr:hover td{background:var(--ch);}
.gn{font-weight:700;color:var(--txt);font-size:12px;}
.gm{color:var(--mut);}
.gp{color:var(--acl);font-weight:600;white-space:nowrap;}
/* SUPPLIERS */
.sr{padding:10px 16px 4px;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--acc);}
.sc{margin:0 16px 7px;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:12px;}
.sn{font-size:13px;font-weight:700;margin-bottom:2px;}
.sct{font-size:11px;color:var(--mut);margin-bottom:3px;}
.sco{font-size:11px;color:var(--mut);}
/* EMPTY */
.es{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;}
.ei{font-size:44px;margin-bottom:12px;opacity:.5;}
.et{font-size:17px;font-weight:700;margin-bottom:6px;}
.ex2{font-size:13px;color:var(--mut);line-height:1.5;}
/* WA FLOAT BTN */
.wa-float{position:fixed;bottom:88px;right:14px;z-index:200;width:48px;height:48px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.4);transition:transform .2s;}

/* INSTALL */
#ip{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}

.ip-box{background:var(--card);border:2px solid var(--acc);border-radius:var(--rl);padding:22px 18px;width:100%;max-width:440px;animation:su .3s ease;box-shadow:0 0 50px var(--glo);}
.ip-title{font-size:16px;font-weight:800;margin-bottom:5px;text-align:center;}
.ip-sub{font-size:12px;color:var(--mut);text-align:center;margin-bottom:18px;}
.ip-tabs{display:flex;gap:8px;margin-bottom:14px;}

.ip-n{width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ip-t{font-size:12px;line-height:1.5;padding-top:3px;}
.ip-close{width:100%;padding:11px;background:var(--bg2);border:1px solid var(--brd);border-radius:8px;color:var(--mut);font-size:13px;font-weight:600;cursor:pointer;}
/* PRINT */
@media print{body{background:#fff;color:#000;}#hdr,#nav,.wa-float,#ip,.fav-btn{display:none!important;}.ftm,.bt{color:#E8720C;}.pn{background:#E8720C;}}

@media(min-width:768px){.cg{grid-template-columns:repeat(3,1fr);}#main{max-width:768px;margin:0 auto;}.wa-float{bottom:22px;right:22px;}#nav{display:none;}}
</style>

const LG=[{"id": "lg01", "num": "1", "title": "Os 3 Caminhos para Começar", "icon": "🛣️", "desc": "Revenda, marca própria terceirizada e fabricação própria — vantagens, limitações e como escolher para o seu momento atual.", "content": "Os três modelos de negócio para quem quer vender produtos de limpeza e automotivos:\n\n1. REVENDA — O mais fácil. Você compra produtos prontos de um fabricante e revende com a sua marca ou a dele. Menor custo de entrada, sem estrutura de produção, mas margens menores e dependência do fornecedor.\n\n2. MARCA PRÓPRIA TERCEIRIZADA — O intermediário. Você contrata um fabricante para produzir com a sua marca. Você é o responsável legal pelo produto, mas não produz fisicamente. Precisa de CNPJ, regularização e contrato com o fabricante.\n\n3. FABRICAÇÃO PRÓPRIA — O mais completo. Você produz tudo. Maior controle de qualidade e melhores margens, mas exige infraestrutura, regularização completa e possivelmente um Responsável Técnico.\n\n💡 Recomendação: comece com revenda ou marca terceirizada para validar o mercado antes de investir em estrutura própria."}, {"id": "lg02", "num": "2", "title": "Venda Antes de Fabricar", "icon": "💡", "desc": "Como validar o produto e começar a vender antes de montar toda a estrutura legal — a estratégia mais inteligente.", "content": "A sequência certa para quem está começando:\n\n1. Teste o produto com sua rede — amigos, família, conhecidos próximos\n2. Colete feedback honesto sobre qualidade, perfume e embalagem\n3. Valide se as pessoas pagariam o preço que você precisa cobrar\n4. Com feedback positivo e primeiras vendas, invista na formalização\n5. Abra o MEI ou ME — processo simples e rápido\n6. Regularize os produtos conforme escala a produção\n\n⚠️ Você pode vender para pessoas físicas como PF por um período curto enquanto regulariza. Não emita nota fiscal sem CNPJ e não venda para CNPJ sem nota.\n\nO erro mais comum: montar toda a estrutura legal e de produção ANTES de validar se o produto vende. Isso gera custos e frustração desnecessários."}, {"id": "lg03", "num": "3", "title": "O Que Você Pode Vender", "icon": "📋", "desc": "Saneantes Risco 1 e Risco 2 — o que cada categoria significa na prática e quais produtos são indicados para iniciar.", "content": "Produtos de limpeza e automotivos são regulados pela ANVISA como saneantes. Há dois níveis:\n\nRISCO 1 — Notificação (mais simples):\n• Sabão líquido e em pó\n• Detergente e lava-louças\n• Amaciante e alvejante sem alegação bactericida\n• Shampoo e condicionador automotivo\n• Limpa vidros, multiuso, limpa piso\n• Aromatizantes e desodorizadores\n\nRISCO 2 — Registro (mais complexo):\n• Alvejante com alegação bactericida\n• Inseticidas e repelentes\n• Desinfetantes com alegação de eliminação de microrganismos\n• Saneantes com cloro acima dos limites permitidos\n\n✅ Recomendação para iniciantes: Comece com Risco 1. São mais fáceis de regularizar, cobrem a maioria dos produtos do guia e têm mercado enorme."}, {"id": "lg04", "num": "4", "title": "Notificação ANVISA Passo a Passo", "icon": "📝", "desc": "11 passos detalhados para notificar seu produto no sistema Solicita — do cadastro ao protocolo final.", "content": "O processo de notificação de saneantes Risco 1 no sistema Solicita:\n\n1. Abra uma empresa (MEI ou ME) — CNPJ é obrigatório\n2. Acesse solicita.anvisa.gov.br e crie seu cadastro com CNPJ\n3. Escolha a opção Saneante → Notificação → Risco 1\n4. Preencha os dados do produto: nome comercial, composição (ingredientes), finalidade e modo de usar\n5. Informe os dados do fabricante: CNPJ, endereço completo\n6. Adicione o rótulo do produto (PDF) — deve ter todas as informações obrigatórias\n7. Pague a GRU (taxa ANVISA) — valor varia por categoria e porte. MEI tem redução\n8. Protocole e aguarde a análise (30 a 60 dias úteis para Risco 1)\n9. Receba o número de notificação por e-mail\n10. Inclua o número de notificação no rótulo de todos os lotes\n11. Guarde toda a documentação — laudos, fichas técnicas e comprovantes\n\n💡 A notificação não é permanente — tem prazo de validade. Acompanhe pelo sistema."}, {"id": "lg05", "num": "5", "title": "Rótulo Certo desde o Início", "icon": "🏷️", "desc": "Informações obrigatórias, erros mais comuns em fiscalização e checklist completo para não ser autuado.", "content": "O rótulo é o documento mais fiscalizado. Um rótulo errado gera autuação mesmo com produto regularizado.\n\nINFORMAÇÕES OBRIGATÓRIAS:\n✅ Nome do produto e marca\n✅ Número de notificação ou registro ANVISA (ex: Notificação ANVISA nº XXXXXXXXX)\n✅ CNPJ e endereço completo do fabricante/responsável\n✅ Composição completa (todos os ingredientes)\n✅ Finalidade de uso (para que serve)\n✅ Modo de usar (como aplicar)\n✅ Precauções e avisos de segurança\n✅ Capacidade do conteúdo (volume em ml ou peso em g)\n✅ Número de lote\n✅ Data de fabricação\n✅ Validade ou prazo de validade\n✅ Frases de segurança quando aplicável\n\nERROS MAIS COMUNS:\n❌ Falta o número de notificação ANVISA\n❌ Composição incompleta ou com nomes errados\n❌ Não tem data de fabricação ou validade\n❌ Informações de contato erradas ou desatualizadas"}, {"id": "lg06", "num": "6", "title": "Responsável Técnico", "icon": "👨‍🔬", "desc": "Quando você precisa de RT, quando não precisa e as opções para quem está começando.", "content": "O Responsável Técnico (RT) é um profissional habilitado (químico, farmacêutico, engenheiro químico ou biólogo) que assina a responsabilidade técnica pelos produtos.\n\nQUANDO É OBRIGATÓRIO:\n• Produtos de Risco 2 (registrados)\n• Empresas com AFE (Autorização de Funcionamento)\n• Produção em escala industrial\n• Exportação de produtos\n\nQUANDO GERALMENTE NÃO É OBRIGATÓRIO:\n• Produtos de Risco 1 notificados por MEI\n• Pequena produção artesanal\n• Revendedores de produtos já regularizados\n\nOPÇÕES PARA NÃO CONTRATAR FIXO:\n• RT por prestação de serviços (freela) — muitos profissionais atendem PMEs por projeto ou mensalidade\n• Parceria com laboratório que já tem RT\n• Contratar a produção de um terceirista que tem RT\n\n💡 Contrate o RT somente quando realmente necessário — é um custo fixo relevante para quem está começando."}, {"id": "lg07", "num": "7", "title": "Abrindo Sua Empresa", "icon": "🏢", "desc": "MEI, ME ou EPP — qual abrir, CNAEs corretos e passo a passo de abertura sem complicação.", "content": "MEI (Microempreendedor Individual):\n• Limite: R$ 81.000/ano (R$ 6.750/mês)\n• Tributação: valor fixo mensal baixo\n• Abertura: portal.gov.br/mei — grátis e em minutos\n• Ideal para: quem está validando o negócio\n\nME (Microempresa):\n• Limite: R$ 360.000/ano\n• Tributação: Simples Nacional\n• Ideal para: quem já vende bem e precisa de nota fiscal para CNPJ\n\nCNAE CORRETOS para fabricação de limpeza:\n• 20.61-4/00 — Fabricação de sabões e detergentes sintéticos\n• 20.62-2/00 — Fabricação de produtos de limpeza e polimento\n• 46.49-4/99 — Comércio atacadista de produtos de higiene e limpeza\n• 47.72-5/00 — Comércio varejista de cosméticos e higiene\n\nPASSO A PASSO MEI:\n1. Acesse gov.br/mei\n2. Informe CPF e data de nascimento\n3. Selecione a atividade (CNAE)\n4. Preencha os dados e emita o CCMEI\n5. Abra conta bancária PJ\n6. Instale o aplicativo MEI para emitir notas"}, {"id": "lg08", "num": "8", "title": "Licença Sanitária e AFE", "icon": "📜", "desc": "Quem precisa, como obter e o que muda por estado e município.", "content": "LICENÇA SANITÁRIA:\n• Emitida pela Vigilância Sanitária municipal ou estadual\n• Necessária para todo estabelecimento que produz, armazena ou distribui produtos regulados\n• Processo varia por município — consulte a VISA local\n• Prazo: geralmente 30 a 90 dias após vistoria\n• Renovação anual ou conforme prazo do estado\n\nAFE — AUTORIZAÇÃO DE FUNCIONAMENTO DE EMPRESA:\n• Emitida pela ANVISA via sistema Solicita\n• Obrigatória para fabricantes e importadores de saneantes\n• Necessita de RT fixo para emissão\n• Não é necessária para revendedores ou terceirizados\n\nALVARÁ DE FUNCIONAMENTO:\n• Emitido pela prefeitura municipal\n• Necessário para toda empresa com atividade comercial\n• Geralmente obtido junto com o registro municipal\n\nSEQUÊNCIA RECOMENDADA:\n1. CNPJ (MEI/ME)\n2. Alvará de funcionamento (prefeitura)\n3. Licença sanitária (VISA local)\n4. AFE da ANVISA (quando obrigatória)\n5. Notificação dos produtos"}, {"id": "lg09", "num": "9", "title": "Checklist Final e Plano de 30 Dias", "icon": "✅", "desc": "3 checklists por modelo de negócio + plano de ação semana a semana para sair do zero ao legal.", "content": "PLANO DE 30 DIAS:\n\nSemana 1 — VALIDAR:\n☐ Produza amostras dos seus 3 a 5 primeiros produtos\n☐ Distribua para 10 a 20 pessoas da sua rede\n☐ Colete feedback sincero sobre qualidade e preço\n☐ Defina o modelo de negócio (revenda, terceirizado ou próprio)\n\nSemana 2 — FORMALIZAR:\n☐ Abra o MEI em portal.gov.br/mei (gratuito)\n☐ Escolha os CNAEs corretos para a sua atividade\n☐ Abra conta bancária PJ\n☐ Instale o app MEI para emissão de notas\n\nSemana 3 — REGULARIZAR:\n☐ Crie os rótulos com todas as informações obrigatórias\n☐ Monte as fichas técnicas de cada produto\n☐ Solicite a licença sanitária na VISA local\n☐ Inicie as notificações ANVISA pelo Solicita\n\nSemana 4 — LANÇAR:\n☐ Defina preços e margens (use a Calculadora de Lucro)\n☐ Crie as embalagens finais\n☐ Divulgue nos grupos e redes sociais\n☐ Comece a vender com nota fiscal\n\n💡 Dica final: Perfeito é inimigo do bom. Comece vendendo e vá regularizando no processo. O importante é começar."}];

function parseAccess(){

// ── SEARCH (RTL FIX — never re-render input) ──────────────────────
function rSearchShell(){
  return`
  <div id="search-wrap" style="position:relative;padding:14px 16px;border-bottom:1px solid var(--brd)">
    <span id="search-icon">🔍</span>
    <input type="text" id="search-inp" dir="ltr" autocomplete="off" autocorrect="off"
      autocapitalize="off" spellcheck="false" lang="pt-BR"
      placeholder="Buscar fórmulas, ingredientes..." 
      style="direction:ltr;text-align:left;unicode-bidi:embed">
  </div>
  <div id="search-results">
    <div class="es"><div class="ei">🔍</div><div class="et">Digite para buscar</div><div class="ex2">Busque por nome, ingrediente ou categoria</div></div>
  </div>`;
}
function bindSearch(){
  const inp=$('search-inp');
  if(!inp)return;
  inp.focus();
  // Restore previous search
  if(S.searchQ){inp.value=S.searchQ;doSearch(S.searchQ);}
  inp.addEventListener('input',e=>{
    const q=e.target.value;
    S.searchQ=q;
    doSearch(q);
  });
  inp.addEventListener('keydown',e=>{
    // Force cursor to end on each keystroke (RTL fix)
    requestAnimationFrame(()=>{
      if(inp.selectionStart!==inp.value.length){
        // Don't force if user is editing middle of text
      }
    });
  });
}
function doSearch(q){
  const el=$('search-results');
  if(!el)return;
  const qn=q.toLowerCase().trim();
  if(qn.length<2){
    el.innerHTML='<div class="es"><div class="ei">🔍</div><div class="et">Digite para buscar</div><div class="ex2">Mínimo 2 caracteres</div></div>';
    return;
  }
  const all=[...AF,...LF];
  const rs=all.filter(f=>
    f.title.toLowerCase().includes(qn)||
    f.desc.toLowerCase().includes(qn)||
    (f.catName||'').toLowerCase().includes(qn)||
    (f.uses||[]).some(u=>u.toLowerCase().includes(qn))
  );
  if(!rs.length){
    el.innerHTML='<div class="es"><div class="ei">😔</div><div class="et">Nenhum resultado</div><div class="ex2">Tente outros termos</div></div>';
    return;
  }
  el.innerHTML=`<div class="fl">${rs.map(f=>{
    const isAuto=AF.includes(f);
    const isLimp=LF.includes(f);const act=isLimp?'limp-form':'auto-form';
    const catKey=isAuto?'autoCat':'limpCat';
    return`<div class="fi${isFav(f.id)?' sv':''}" data-action="${act}" data-id="${f.id}" data-cat="${f.cat}">
      <div class="fic">
        <div style="font-size:10px;color:var(--acc);margin-bottom:2px;font-weight:700">${f.catIcon||''} ${f.catName||''}</div>
        <div class="fit">${f.title}</div>
        <div class="fid">${f.desc}</div>
      </div>
      <div class="far">›</div>
    </div>`;
  }).join('')}</div>`;
  bindCommon();
}

// ── EVENT BINDING ──────────────────────────────────────────────────
function bindCommon(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    // Avoid double-binding
    if(el._bound)return;
    el._bound=true;
    el.addEventListener('click',handleClick);
  });
  const gi=$('gi');
  if(gi)gi.addEventListener('input',e=>{
    const q=e.target.value.toLowerCase();
    document.querySelectorAll('#gb tr').forEach(r=>{
      r.style.display=r.textContent.toLowerCase().includes(q)?'':'none';
    });
  });
}

function handleClick(e){
  const el=e.currentTarget,ac=el.dataset.action;
  switch(ac){
    case'go': go(el.dataset.v);break;
    case'upsell': {
      const urls={base:'',limp:'https://pay.hotmart.com/G106306791H',leg:'https://pay.hotmart.com/O106306505N',form:'https://pay.hotmart.com/C106306412J'};
      const v=el.dataset.v;const key=el.dataset.key;
      if(key&&!S.access[key]&&urls[key])window.open(urls[key],'_blank');
      break;
    }
    case'auto-cat': go('auto-cat',{autoCat:el.dataset.cat});break;
    case'auto-form': go('auto-form',{autoForm:el.dataset.id,autoCat:el.dataset.cat||S.autoCat});break;
    case'limp-cat': go('limp-cat',{limpCat:el.dataset.cat});break;
    case'limp-form': go('limp-form',{limpForm:el.dataset.id,limpCat:el.dataset.cat||S.limpCat});break;
    case'leg-cap': go('legal-cap',{legCap:el.dataset.id});break;
    case'back-cat': go(el.dataset.view,{autoCat:el.dataset.cat,limpCat:el.dataset.cat});break;
    case'fav': togFav(el.dataset.id,e);break;
    case'ip-tab': S.instTab=el.dataset.tab;renderInstTabs();break;
  }
}

let dP=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dP=e;});

// ── INIT ──────────────────────────────────────────────────────────
function init(){
  setTimeout(()=>{
    const sp=$('splash'),ap=$('app');
    if(sp){sp.style.opacity='0';sp.style.transition='opacity .5s';}
    setTimeout(()=>{
      if(sp)sp.style.display='none';
      if(ap)ap.removeAttribute('hidden');
      render();
      // Show install on first visit if not standalone
      const standalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;
      if(!standalone&&!localStorage.getItem('fap_inst_shown')){
        setTimeout(openInst,1500);
        localStorage.setItem('fap_inst_shown','1');
      }
    },520);
  },2000);

  document.querySelectorAll('.ni').forEach(el=>{
    el.addEventListener('click',()=>{const v=el.dataset.v;if(v)go(v);});
  });
  $('hdr-logo')?.addEventListener('click',()=>go('home'));
  $('hdr-s-btn')?.addEventListener('click',()=>go('search'));
  $('hdr-f-btn')?.addEventListener('click',()=>go('favs'));
  $('hdr-inst-btn')?.addEventListener('click',openInst);
}
document.addEventListener('DOMContentLoaded',init);
</script>
